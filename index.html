<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A simple, fast, and secure Markdown (.md) file viewer right in your browser. Upload and preview markdown documents instantly.">
    <meta name="keywords"
        content="Markdown Viewer, MD Viewer, Markdown Preview, Markdown Reader, Online Markdown Viewer">
    <meta name="author" content="Markdown Viewer">
    <meta property="og:title" content="Markdown File Viewer">
    <meta property="og:description"
        content="A simple, fast, and secure Markdown (.md) file viewer right in your browser.">
    <meta property="og:type" content="website">
    <title>Markdown File Viewer - Free Online MD Reader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navigation -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-file-markdown mr-2"></i>
                    Markdown File Viewer
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container my-5" id="mainContainer">
        <!-- Upload Section -->
        <section class="row" id="uploadSection">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h1 class="card-title h5 mb-0">
                            <i class="fas fa-upload mr-2"></i>
                            Upload Markdown File
                        </h1>
                    </div>
                    <div class="card-body">
                        <div id="uploadArea" class="upload-area">
                            <div class="upload-icon">
                                <i class="fas fa-cloud-upload-alt"></i>
                            </div>
                            <h2>Drag &amp; Drop your markdown file here</h2>
                            <p class="text-muted mb-3">or click to browse files</p>
                            <button type="button" class="btn btn-primary" id="browseBtn">
                                <i class="fas fa-folder-open mr-2"></i>
                                Browse Files
                            </button>
                        </div>
                        <input type="file" id="fileInput" class="file-input" accept=".md,.markdown"
                            aria-label="Upload Markdown file" />

                        <!-- Alert Messages -->
                        <div id="alertContainer" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Preview Section -->
        <section class="row d-none" id="previewSection">
            <div class="col-12">
                <div class="card shadow-sm h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h2 class="card-title h5 mb-0">
                            <i class="fas fa-eye mr-2"></i>
                            Markdown Preview
                        </h2>
                        <div>
                            <button type="button" class="btn btn-outline-success btn-sm mr-2" id="downloadPdfBtn">
                                <i class="fas fa-file-pdf mr-1"></i> Download PDF
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-sm mr-2" id="uploadOtherBtn">
                                <i class="fas fa-upload mr-1"></i> Upload Other
                            </button>
                            <button type="button" class="btn btn-outline-danger btn-sm btn-clear" id="clearBtnTop">
                                <i class="fas fa-times mr-1"></i> Clear
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="previewArea" class="preview-area border-0 rounded-bottom">
                            <!-- content injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">
                <i class="fas fa-code mr-2"></i>
                Simple Markdown File Viewer - Built with HTML, CSS, JavaScript &amp; Bootstrap
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- html2pdf.js for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="./script.js" type="text/javascript"></script>
</body>

</html>
